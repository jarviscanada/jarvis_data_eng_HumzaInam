summary: Computer Engineering graduate with hands-on experience in data engineering, analytics, cloud infrastructure, and full-stack development. Completed Linux cluster monitoring, SQL database management, Java application development, Python data analytics, and Databricks ETL/DLT pipeline projects at Jarvis. Proficient in building scalable data solutions using Java, Python, SQL (PostgreSQL), PySpark, and cloud services (Azure, Databricks). Experienced in ETL pipelines, Delta Lake, customer analytics, real-time data streaming, serverless architectures, and automated data processing systems. Strong foundation in object-oriented programming, data analysis with Pandas/NumPy, and agile methodologies. Passionate about leveraging data engineering and analytics to drive business insights and operational efficiency. Seeking a Data Engineering or Data Analytics role where I can apply my technical skills in Java, Python, SQL, cloud platforms, and data visualization to build robust data solutions and deliver actionable insights.

