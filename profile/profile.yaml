# List of Jarvis projects
jarvis_projects:
  - name: "Linux Cluster Resource Monitoring App"
    git_url: "/linux_sql"
    # Please read the project description guideline carefully. Make sure you follow the simplified SDLC pattern. (t.ly/NlXQ)
    # Please include the following keywords: CentOS, Bash/Shell, docker, RDBMS/SQL/Postgresql, crontab, data analytics
    description: Developed a Linux cluster monitoring solution using Bash scripts and PostgreSQL to track hardware specifications and real-time resource usage across Rocky Linux servers. Implemented Docker containerization for PostgreSQL database, automated data collection via crontab, and designed SQL queries for resource analytics. Collected CPU, memory, and disk metrics every minute to identify low-memory servers and optimize capacity planning. Applied GitFlow version control and deployed on Google Cloud Platform for the Jarvis LCA team.
  - name: "Java Grep Application"
    git_url: "/core_java/grep"
    description: Built a Java-based command-line grep application to recursively search directory trees for regex pattern matches and output results to a file. Implemented file system traversal, buffered file I/O, and regex matching using core Java APIs. Applied object-oriented design principles with interface-based abstraction, exception handling, and logging via SLF4J and Log4j. Designed the application for scalability and maintainability, supporting large directory structures and automated execution in Linux environments.
  - name: "London Gift Shop Customer Analytics"
    git_url: "/python_data_analytics"
    description: Developed a customer analytics proof-of-concept for a UK-based e-commerce retailer using Python, Jupyter Notebook, Pandas, and NumPy to analyze transactional retail data and customer purchasing behavior. Performed data cleaning, validation, and feature engineering to transform raw invoice-level data into customer-level insights. Implemented RFM (Recency, Frequency, Monetary) analysis and customer segmentation to identify high-value, loyal, and at-risk customers. Generated monthly user activity metrics and business-ready summaries to support targeted marketing campaigns and customer retention strategies for the LGS marketing team.
  - name: "Databricks ETL & DLT Pipelines"
    git_url: "/databricks"
    description: Built two data engineering pipelines on Databricks using medallion architecture (Bronze, Silver, Gold). Developed fraud detection ETL pipeline processing credit card transaction data from Azure SQL Database, Blob Storage, and ADLS Gen2 using JDBC, Azure Data Factory, and Lakeflow Connect. Implemented data transformation with PySpark, creating 15 analytics tables to identify fraud patterns by user behavior, merchant categories, transaction timing, and spending anomalies. Designed automated Databricks Workflows with scheduled job orchestration and published SQL dashboards with interactive visualizations. Built Delta Live Tables pipeline for stock market analytics, ingesting daily data from Alpha Vantage API, applying data quality checks, and generating aggregated metrics. Applied Delta Lake for ACID transactions, designed complex joins and aggregations, and implemented end-to-end data pipelines from ingestion to business intelligence reporting.

# List of personal or academic projects
